<!DOCTYPE html>
<html lang="en">
<head>

    <title>Neighborhood Story</title>

    <link rel="stylesheet" href="stry.css">
</head>
<body>
    <div id="container">
        <div class="monitor-contents">
            <video id="monitor" playsinline autoplay muted loop>
                <source media="(max-width: 1000px)" src="https://chitsuneudon.github.io/commlab/shanzai-web/assets/betterintro.mp4" type="video/mp4">
                <source media="(min-width: 1000px)" src="https://chitsuneudon.github.io/commlab/shanzai-web/assets/betterintro.mp4" type="video/mp4">

            </video>
        </div>
        <div class="monitor-overlay" style="background-image: url(https://chitsuneudon.github.io/commlab/shanzai-web/assets/frame.png);"></div>
        <div class="monitor-gradient"></div>
        <div class="monitor-frame-shadow"></div>
        <div class="monitor-frame image-loaded" style="background-image: url(/assets/frame.png);"></div>
        <div class="text-decoration"></div>
        <header class="fadeIn show">
            <div class="pages-box">
                <a class="change-page" title="PAGES">
                    PAGES
                </a>
                <ul class="page-list">
                    <li>
                        <a class="page-list-link" href="index.html" target="_blank">Main</a>
                    </li>
                    <li>
                        <a class="page-list-link" href="nbhd.html" target="_blank">Nbhd Story</a>
                    </li>
                    <li>
                        <a class="page-list-link" href="nana.html" target="_blank">Nana</a>
                    </li>
                    <li>
                        <a class="page-list-link" href="parakiss.html" target="_blank">Parakiss</a>
                    </li>
                </ul>
            </div>
        </header>
        <h1 class="fadeIn show">
            <img src="assets/happy-berry.png" alt="happy-berry">
        </h1>
        <a href="https://www.youtube.com/watch?v=0r8ECw4C5as" class="trailer fadeIn show" data-fancybox>
            <span class="trailer-pink">
                <img src="assets/trailer-pink.png" alt="">
            </span>
            <span class="trailer-blue">
                <img src="assets/trailer-blue.png" alt="">
            </span>
        </a>
        <div class="trailer-text fadeIn show">
            <img src="assets/play.png" alt="">
        </div>
        <div class="store fadeIn show">
            <h2 class="store-title">
                <img src="assets/title.png" alt="">
            </h2>
            <div class="store-box">
                <a href="https://www.viz.com/neighborhood-story" id="store-btn-official" class="store-btn" title="Official" target="_blank">
                    <span>Official</span>
                </a>
                <a href="https://www.imdb.com/title/tt0346285/" id="store-btn-anime" class="store-btn" title="Anime" target="_blank">
                    <span>Anime</span>
                </a>
                <a href="https://en.wikipedia.org/wiki/Neighborhood_Story" id="store-btn-wiki" class="store-btn" title="Wiki" target="_blank">
                    <span>Wiki</span>
                </a>
                <a href="https://lineup.toei-anim.co.jp/en/tv/gokinjyo/" id="store-btn-info" class="store-btn" title="Info" target="_blank">
                    <span>Info</span>
                </a>
            </div>
        </div>
    </div>
